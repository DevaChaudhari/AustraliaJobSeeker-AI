apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: australiajobseeker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: australiajobseeker-frontend
  template:
    metadata:
      labels:
        app: australiajobseeker-frontend
    spec:
      containers:
      - name: frontend
        image: devachaudhari/australiajobseeker-ai:latest
        imagePullPolicy: Always
        command: ["streamlit", "run", "frontend/app.py"]
        ports:
        - containerPort: 8501
          name: streamlit
        env:
        - name: BACKEND_URL
          value: "http://app:8000"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        volumeMounts:
        - name: app-data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: app-data-pvc
