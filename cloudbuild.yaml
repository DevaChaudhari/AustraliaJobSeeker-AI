steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/australiajobseeker-ai/app:$COMMIT_SHA'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/australiajobseeker-ai/app:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'australiajobseeker-ai'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/australiajobseeker-ai/app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars=GROQ_API_KEY=$_GROQ_API_KEY'
    secretEnv: ['_GROQ_API_KEY']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GROQ_API_KEY/versions/latest
      env: '_GROQ_API_KEY'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/australiajobseeker-ai/app:$COMMIT_SHA'
