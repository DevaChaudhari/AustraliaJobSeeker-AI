services:
  app:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LANGCHAIN_TRACING_V2=false
      - SEEK_MAX_PAGES=1
      - SEEK_MAX_JOBS=10
      - MAX_RESPONSE_JOBS=10
    volumes:
      - ../data:/app/data
    networks:
      - australiajobseeker

  frontend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    command: streamlit run frontend/app.py
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://app:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    depends_on:
      - app
    volumes:
      - ../data:/app/data
    networks:
      - australiajobseeker

volumes:
  ollama_data:

networks:
  australiajobseeker:
    driver: bridge